name: Deploy Portfolio to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch: # Cho phép bạn chạy workflow này thủ công nếu cần

# Cấp quyền cần thiết để GitHub Actions có thể deploy
permissions:
  contents: read
  pages: write
  id-token: write

# Chống việc chạy đè nhiều action cùng lúc
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      # Dựa vào hình 1 của bạn, mình thấy có file pnpm-lock.yaml, 
      # bạn nên dùng pnpm hoặc giữ nguyên npm tùy cách bạn thiết lập
      - name: Install dependencies
        run: pnpm install 

      - name: Build project
        run: npx webpack

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # QUAN TRỌNG: Sửa './dist' thành tên thư mục đầu ra của bạn nếu webpack xuất ra thư mục khác (ví dụ: './build')
          path: './build' 

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build # Job này chỉ chạy sau khi job build hoàn thành
  steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. THÊM BƯỚC NÀY ĐỂ CÀI ĐẶT PNPM
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9 # Bạn có thể chọn phiên bản pnpm bạn đang dùng ở máy (vd: 8 hoặc 9)

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'pnpm' # (Tùy chọn) Thêm dòng này để GitHub lưu cache, giúp các lần chạy sau nhanh hơn

      # 2. BÂY GIỜ BẠN CÓ THỂ CHẠY PNPM BÌNH THƯỜNG
      - name: Install dependencies
        run: pnpm install 

      - name: Build project
        run: npx webpack
        # ... (giữ nguyên các bước setup Pages và deploy bên dưới như cũ)
